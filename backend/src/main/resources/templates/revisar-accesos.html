<!-- sE crea esta plantilla para mostrar la funcionalidad del pbi revisar accessos  -->


<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría de Seguridad - DentalCare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-dark text-white py-3">
            <h5 class="card-title mb-0 d-flex align-items-center">
                <i class="bi bi-shield-check text-warning me-2 fs-4"></i> 
                Revisar Accesos de Usuarios
            </h5>
        </div>
        
        <div class="card-body p-4">
            <form th:action="@{/admin/seguridad/accesos}" method="get" class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label fw-semibold text-muted">Filtrar por Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-person text-secondary"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Ej: juanperez" th:value="${usernameAnterior}">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold text-muted">Fecha Inicial</label>
                    <input type="datetime-local" name="inicio" class="form-control" th:value="${inicioAnterior}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold text-muted">Fecha Final</label>
                    <input type="datetime-local" name="fin" class="form-control" th:value="${finAnterior}">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-funnel-fill"></i> Filtrar
                    </button>
                </div>
            </form>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <span class="text-secondary small fw-medium" th:text="${'Mostrando ' + listaAccesos.size() + ' registros encontrados.'}"></span>
                <a th:href="@{/admin/seguridad/accesos}" class="btn btn-outline-secondary btn-sm">Limpiar Filtros</a>
            </div>

            <div class="table-responsive rounded border">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light text-uppercase fs-7 text-secondary">
                        <tr>
                            <th class="ps-3" style="width: 120px;">ID Registro</th>
                            <th>Usuario Involucrado</th>
                            <th>Correo Electrónico</th>
                            <th>Fecha e Historial Exacto</th>
                            <th class="text-center" style="width: 180px;">Estado de Acceso</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="registro : ${listaAccesos}">
                            <td class="ps-3 text-mono text-secondary" th:text="${'#AC-' + registro.idRegistroAcceso}">#AC-1</td>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="avatar-sm bg-secondary-subtle text-secondary rounded-circle p-2 me-2 d-inline-flex justify-content-center align-items-center" style="width: 32px; height: 32px;">
                                        <i class="bi bi-person-badge"></i>
                                    </div>
                                    <span th:text="${registro.usuario.usernameUsuario}" class="fw-bold text-dark">juanperez</span>
                                </div>
                            </td>
                            <td th:text="${registro.usuario.emailUsuario}" class="text-muted">juan.perez@email.com</td>
                            <td th:text="${#temporals.format(registro.fechaAcceso, 'dd/MM/yyyy - hh:mm:ss a')}" class="text-secondary fw-medium">03/06/2026 - 11:15:00 pm</td>
                            <td class="text-center">
                                <span th:if="${registro.esExitoso}" class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill">
                                    <i class="bi bi-shield-fill-check me-1"></i> Exitoso
                                </span>
                                <span th:unless="${registro.esExitoso}" class="badge bg-danger-subtle text-danger border border-danger px-3 py-2 rounded-pill fw-bold">
                                    <i class="bi bi-shield-fill-x me-1"></i> Fallido
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listaAccesos)}">
                            <td colspan="5" class="text-center py-5">
                                <i class="bi bi-folder-x text-muted fs-1 d-block mb-2"></i>
                                <span class="text-muted fw-medium">No existen auditorías registradas que coincidan con la búsqueda.</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
        </div>
    </div>
</div>

<script>
    // Validación Dinámica de Rango de Fechas
    document.querySelector('form').addEventListener('submit', function(e) {
        const inputInicio = document.getElementsByName('inicio')[0].value;
        const inputFin = document.getElementsByName('fin')[0].value;
        
        if (inputInicio && inputFin && new Date(inputInicio) > new Date(inputFin)) {
            alert("Inconsistencia en los parámetros: La fecha inicial no puede ser superior al límite de fecha final.");
            e.preventDefault();
        }
    });
</script>
</body>
</html>
